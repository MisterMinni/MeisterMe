<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#005aab" />
    <title>MeisterMe</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #17324d; }
      main { width: min(420px, 100%); padding: 32px; text-align: center; border-radius: 24px; background: #fff; box-shadow: 0 24px 70px -45px #17324d; }
      .logo { width: 72px; height: 72px; margin: 0 auto 20px; display: grid; place-items: center; border-radius: 20px; background: #005aab; color: #fff; font-size: 32px; font-weight: 800; }
      h1 { margin: 0; font-size: 24px; }
      p { margin: 12px 0 0; color: #64748b; line-height: 1.6; }
      code { display: inline-block; margin-top: 16px; border-radius: 8px; background: #edf4fb; padding: 6px 9px; color: #005aab; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">M</div>
      <h1>MeisterMe App</h1>
      <p>Der native Container ist bereit. Vor dem Store-Build muss die produktive HTTPS-Adresse gesetzt und synchronisiert werden.</p>
      <code>MEISTERME_APP_URL</code>
    </main>
  </body>
</html>
