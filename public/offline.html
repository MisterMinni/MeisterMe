<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#005aab" />
    <title>MeisterMe – offline</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Inter, system-ui, sans-serif; background: #f4f7fb; color: #17324d; }
      main { width: min(440px, 100%); padding: 36px; text-align: center; border: 1px solid #dce5ef; border-radius: 24px; background: white; box-shadow: 0 18px 50px -30px #17324d; }
      .icon { width: 64px; height: 64px; margin: 0 auto 20px; display: grid; place-items: center; border-radius: 18px; background: #005aab; color: white; font-size: 30px; }
      h1 { margin: 0; font-size: 24px; }
      p { margin: 12px 0 24px; line-height: 1.6; color: #64748b; }
      button { border: 0; border-radius: 12px; padding: 12px 18px; background: #005aab; color: white; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">M</div>
      <h1>Gerade keine Verbindung</h1>
      <p>MeisterMe benötigt für die Synchronisierung eine Internetverbindung. Bereits geöffnete statische Inhalte bleiben verfügbar.</p>
      <button type="button" onclick="location.reload()">Erneut versuchen</button>
    </main>
  </body>
</html>
