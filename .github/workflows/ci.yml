name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: https://ci-project.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_key_1234567890
      SUPABASE_URL: https://ci-project.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_key_1234567890
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
